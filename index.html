<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fintech Admin Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #0b1120; color: #ffffff; padding-bottom: 20px; }
    h1, h2, h3, h4, h5, h6, p, span, div, b { color: #ffffff !important; }
    
    label, .small, .text-muted { color: #cbd5e1 !important; font-weight: 600 !important; font-size: 0.9rem !important; margin-bottom: 4px; display: block; }
    .text-info { color: #38bdf8 !important; }
    .text-success { color: #4ade80 !important; }
    .text-warning { color: #facc15 !important; }

    .glass-card { background: #162032; border: 1px solid #334155; border-radius: 16px; transition: 0.3s; }
    .form-control, .form-select { 
      background-color: #1e293b !important; border: 1px solid #475569 !important; color: #ffffff !important; 
      border-radius: 10px; padding: 12px; font-weight: 500;
    }
    .form-control:focus { border-color: #38bdf8 !important; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.4) !important; }
    
    .btn-action { border-radius: 14px; padding: 12px; border: none; font-weight: 700; transition: 0.2s; color: #fff !important; }
    .btn-action:active { transform: scale(0.95); }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; color: #fff !important; }
    
    .modal-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); 
      z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px);
    }
    .modal-content-custom {
      background: #162032; border: 1px solid #38bdf8; border-radius: 20px; width: 95%; max-width: 500px; 
      max-height: 90vh; overflow-y: auto; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.9);
    }

    .loader { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; z-index:9999; justify-content:center; align-items:center; flex-direction: column; }
    .borrower-card { background: #1e293b; border-left: 6px solid #38bdf8; border-radius: 12px; margin-bottom: 12px; padding: 15px; cursor: pointer; border-top: 1px solid #334155; border-right: 1px solid #334155; border-bottom: 1px solid #334155; }
    .borrower-card:hover { background: #293850; transform: translateX(5px); }
    
    /* สไตล์ส่วนหัวลดขนาด */
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-top: 10px; }
    .stat-card { padding: 12px; }
    .stat-card h4 { font-size: 1.25rem; margin: 0; }
    .stat-card small { font-size: 0.75rem; text-transform: uppercase; }

    .nav-tabs-custom { border-bottom: 2px solid #334155; margin-bottom: 15px; display: flex; }
    .nav-tabs-custom div { padding: 8px 15px; cursor: pointer; font-weight: 600; color: #94a3b8; border-bottom: 2px solid transparent; font-size: 0.9rem; }
    .nav-tabs-custom div.active { color: #38bdf8 !important; border-bottom: 2px solid #38bdf8; }

    .filter-btn-group { display: flex; gap: 6px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
    .btn-filter { background: #1e293b; color: #fff; border: 1px solid #334155; border-radius: 8px; padding: 6px 12px; white-space: nowrap; font-size: 0.8rem; transition: 0.3s; }
    .btn-filter.active { background: #38bdf8; color: #000 !important; border-color: #38bdf8; }
  </style>
</head>
<body>

<div class="loader" id="loader"><div class="spinner-border text-info mb-3"></div><h5 class="text-white fw-bold">ประมวลผล...</h5></div>

<div class="container" style="max-width: 550px;">
  
  <div id="loginPage" class="glass-card p-5 text-center mt-5">
    <h2 class="fw-bold mb-4">Fintech <span class="text-info">Pro</span></h2>
    <input type="text" id="userId" class="form-control mb-3" placeholder="Admin ID" onkeypress="if(event.key === 'Enter') login()">
    <input type="password" id="password" class="form-control mb-4" placeholder="Password" onkeypress="if(event.key === 'Enter') login()">
    <button onclick="login()" class="btn btn-info w-100 py-3 fw-bold text-white shadow-lg">Login</button>
  </div>

  <div id="mainApp" style="display:none">
    <div class="top-bar">
      <h5 class="fw-bold m-0 text-info">Fintech Dashboard</h5>
      <button onclick="location.reload()" class="btn btn-danger btn-sm rounded-pill px-3">Logout</button>
    </div>

    <div class="row g-2 mb-3">
      <div class="col-6"><div class="glass-card stat-card text-center"><small class="text-muted fw-bold">ปล่อยกู้รวม</small><h4 class="fw-bold">฿<span id="mTotalLoan">0</span></h4></div></div>
      <div class="col-6"><div class="glass-card stat-card text-center" style="border-color: #38bdf8;"><small class="text-info fw-bold">คงค้างรวม</small><h4 class="fw-bold text-info">฿<span id="mTotalRemain">0</span></h4></div></div>
    </div>

    <div class="row g-2 mb-4">
      <div class="col-6"><button onclick="openModal('modalPay')" class="btn-action bg-primary w-100 shadow"><i class="fa-solid fa-wallet me-2"></i>บันทึกรับเงิน</button></div>
      <div class="col-6"><button onclick="openModal('modalCreate')" class="btn-action bg-success w-100 shadow"><i class="fa-solid fa-plus me-2"></i>ปล่อยยอดกู้</button></div>
    </div>

    <div class="mt-2">
      <div class="filter-btn-group">
        <button class="btn-filter active" id="f-all" onclick="filterData('all')">ทั้งหมด</button>
        <button class="btn-filter" id="f-1" onclick="filterData('1')">รายวัน</button>
        <button class="btn-filter" id="f-15" onclick="filterData('15')">15 วัน</button>
        <button class="btn-filter" id="f-30" onclick="filterData('30')">รายเดือน</button>
      </div>
      <input class="form-control mb-3" type="text" id="searchLoan" placeholder="🔍 ค้นชื่อ หรือ สัญญา..." onkeyup="filterLoans()">
      <div id="loanContainer"></div>
    </div>
  </div>
</div>

<div id="modalDetails" class="modal-overlay">
  <div class="modal-content-custom">
    <div class="d-flex justify-content-between mb-3 border-bottom border-secondary pb-3">
      <h6 class="fw-bold m-0"><i class="fa-solid fa-file-invoice me-2"></i>ข้อมูลสัญญา</h6>
      <i class="fa-solid fa-circle-xmark text-danger fs-4" onclick="closeModal('modalDetails')" style="cursor:pointer"></i>
    </div>
    <div class="p-3 mb-3 rounded" style="background: rgba(56, 189, 248, 0.1); border: 1px solid #38bdf8;">
      <h5 class="fw-bold text-white mb-1" id="dName">...</h5>
      <small class="text-info d-block mb-2" id="dLoanId">...</small>
      <div class="row text-center mt-2 border-top border-secondary pt-2">
        <div class="col-4 border-end border-secondary"><small class="text-muted d-block">ยอดกู้</small><b id="dPrin">0</b></div>
        <div class="col-4 border-end border-secondary"><small class="text-muted d-block">ชำระแล้ว</small><b class="text-success" id="dPaid">0</b></div>
        <div class="col-4"><small class="text-muted d-block">คงเหลือ</small><b class="text-warning" id="dRemain">0</b></div>
      </div>
    </div>
    <div class="nav-tabs-custom">
      <div id="tabBtnHistory" class="active" onclick="switchDetailTab('History')">ประวัติเงิน</div>
      <div id="tabBtnSchedule" onclick="switchDetailTab('Schedule')">ตารางงวด</div>
    </div>
    <div id="dHistory" style="max-height: 250px; overflow-y: auto;"></div>
    <div id="dSchedule" style="max-height: 250px; overflow-y: auto; display:none;"></div>
  </div>
</div>

<div id="modalPay" class="modal-overlay">
  <div class="modal-content-custom">
    <div class="d-flex justify-content-between mb-3 border-bottom border-secondary pb-3">
      <h6 class="fw-bold m-0 text-info"><i class="fa-solid fa-wallet me-2"></i>บันทึกรับเงิน</h6>
      <i class="fa-solid fa-circle-xmark text-danger fs-4" onclick="closeModal('modalPay')" style="cursor:pointer"></i>
    </div>
    <label>พิมพ์ชื่อผู้กู้ที่ต้องการค้นหา</label>
    <div class="input-group mb-3">
      <input list="payLoanOptions" id="loanIdInput" class="form-control" placeholder="พิมพ์ชื่อเล่น/ชื่อจริง...">
      <datalist id="payLoanOptions"></datalist>
      <button onclick="fetchPreview()" class="btn btn-info text-white fw-bold px-3">ดึงข้อมูล</button>
    </div>
    <div id="payDetails" style="display:none">
      <div class="p-3 mb-3 rounded" style="background: #0f172a; border: 1px dashed #475569;"><h6 class="m-0 text-white fw-bold" id="pName">...</h6><p class="text-info m-0 small" id="pDetailTxt">...</p></div>
      <label class="text-info fw-bold">ยอดโอนมาจริง (บาท)</label>
      <input type="number" id="pTotalPaidInput" class="form-control text-white fw-bold fs-4 mb-3" style="border: 2px solid #38bdf8 !important;">
      <div class="row g-2 mb-3">
        <div class="col-12"><label>วันที่จ่าย</label><input type="date" id="pPayDate" class="form-control"></div>
        <div class="col-6"><label>ช่องทาง</label><select id="pMethod" class="form-select"><option value="เงินโอน">ธนาคาร</option><option value="เงินสด">เงินสด</option></select></div>
        <div class="col-6"><label>สลิป</label><input type="file" id="pSlip" class="form-control"></div>
      </div>
      <button onclick="submitPay()" class="btn btn-primary w-100 fw-bold py-3 shadow">ยืนยันหักยอด</button>
    </div>
  </div>
</div>

<div id="modalCreate" class="modal-overlay">
  <div class="modal-content-custom">
    <div class="d-flex justify-content-between mb-3 border-bottom border-secondary pb-3">
      <h6 class="fw-bold m-0 text-success"><i class="fa-solid fa-plus me-2"></i>เปิดสัญญาใหม่</h6>
      <i class="fa-solid fa-circle-xmark text-danger fs-4" onclick="closeModal('modalCreate')" style="cursor:pointer"></i>
    </div>
    <select id="cUserSelect" class="form-select mb-3" onchange="toggleNewUserForm()"><option value="NEW">➕ ผู้กู้รายใหม่</option></select>
    <div id="newUserFormBox" class="p-3 mb-3 rounded" style="background: #0f172a;">
      <input type="text" id="cName" class="form-control mb-2" placeholder="ชื่อ-นามสกุล">
      <input type="text" id="cNick" class="form-control mb-2" placeholder="ชื่อเล่น">
      <input type="text" id="cPhone" class="form-control mb-2" placeholder="เบอร์โทร">
      <label>รูปถ่าย</label><input type="file" id="cPhoto" class="form-control">
    </div>
    <div class="row g-2 mb-3">
      <div class="col-12"><label>วันที่เริ่มกู้</label><input type="date" id="cStartDate" class="form-control" oninput="generateSchedulePreview()"></div>
      <div class="col-6"><label>เงินต้น</label><input type="number" id="cAmount" class="form-control" oninput="generateSchedulePreview()"></div>
      <div class="col-6"><label>ดอก (%)</label><input type="number" id="cRate" class="form-control" value="5" oninput="generateSchedulePreview()"></div>
      <div class="col-6"><label>รอบ</label><select id="cCycle" class="form-select" onchange="generateSchedulePreview()"><option value="1">รายวัน</option><option value="15">15 วัน</option><option value="30">รายเดือน</option></select></div>
      <div class="col-6"><label>งวด</label><input type="number" id="cInstallments" class="form-control" value="1" oninput="generateSchedulePreview()"></div>
    </div>
    <div id="cSchedulePreview" class="p-2 rounded mb-3 small" style="background:#0f172a; max-height: 80px; overflow-y: auto;"></div>
    <button onclick="saveLoan()" class="btn btn-success w-100 py-3 fw-bold shadow">บันทึกข้อมูล</button>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxkq39mAaFRG584lXiQfqogwzTiPCjRWleq1L8JKiDVqa4YYphMRTYvlgefOqVI4ac4yQ/exec";
  let allLoans = [];
  let curPay = null;

  document.getElementById('cStartDate').valueAsDate = new Date();

  function toggleL(s){ document.getElementById('loader').style.display = s?'flex':'none'; }
  function openModal(id) { document.getElementById(id).style.display = 'flex'; }
  function closeModal(id) { document.getElementById(id).style.display = 'none'; }

  function switchDetailTab(tab) {
    document.querySelectorAll('.nav-tabs-custom div').forEach(d => d.classList.remove('active'));
    document.getElementById('tabBtn'+tab).classList.add('active');
    document.getElementById('dHistory').style.display = tab==='History'?'block':'none';
    document.getElementById('dSchedule').style.display = tab==='Schedule'?'block':'none';
  }

  async function api(data){
    const r = await fetch(GAS_URL, {method:'POST', body:JSON.stringify(data)});
    return await r.json();
  }

  async function login(){
    toggleL(true);
    const res = await api({action:'login', userId:document.getElementById('userId').value, password:document.getElementById('password').value});
    toggleL(false);
    if(res.success){ document.getElementById('loginPage').style.display='none'; document.getElementById('mainApp').style.display='block'; loadDash(); }
    else alert('รหัสผิด');
  }

  async function loadDash(){
    const res = await api({action:'getDashboard'});
    allLoans = res.activeLoans;
    document.getElementById('mTotalLoan').innerText = Math.round(res.metrics.totalLoan).toLocaleString();
    document.getElementById('mTotalRemain').innerText = Math.round(res.metrics.totalRemain).toLocaleString();
    
    // เติม Dropdown และ Datalist
    let optHtml = '<option value="NEW">➕ ผู้กู้รายใหม่</option>';
    let datalistHtml = '';
    res.users.forEach(u => { optHtml += `<option value="${u.id}">${u.name} (${u.nickname})</option>`; });
    allLoans.forEach(l => { datalistHtml += `<option value="${l.loanId}">${l.userName} (${l.nickname}) [฿${l.amount}]</option>`; });
    
    document.getElementById('cUserSelect').innerHTML = optHtml;
    document.getElementById('payLoanOptions').innerHTML = datalistHtml;
    renderLoans(allLoans);
  }

  function renderLoans(data) {
    let html = '';
    data.forEach(b => {
      let statusClass = b.daysLeft <= 0 ? 'bg-danger' : (b.daysLeft <= 3 ? 'bg-warning text-dark' : 'bg-primary');
      html += `
        <div class="borrower-card" onclick="viewDetails('${b.loanId}')">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <h6 class="fw-bold mb-1">👤 ${b.userName} (${b.nickname})</h6>
              <p class="mb-0 text-info fw-bold">ต้นเหลือ: ฿${Number(b.amount).toLocaleString()}</p>
              <p class="mb-0 text-muted small">กำหนด: ${b.dueDate}</p>
            </div>
            <div class="text-end">
              <span class="status-badge ${statusClass} d-block mb-2">${b.daysLeft <= 0 ? 'เลยกำหนด' : `อีก ${b.daysLeft} วัน`}</span>
              <button class="btn btn-sm btn-primary rounded-pill px-3 fw-bold" onclick="event.stopPropagation(); quickPay('${b.loanId}')">จ่าย</button>
            </div>
          </div>
        </div>`;
    });
    document.getElementById('loanContainer').innerHTML = html || '<div class="text-muted text-center p-3">ไม่มีข้อมูล</div>';
  }

  function filterData(type) {
    document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
    document.getElementById('f-'+type).classList.add('active');
    renderLoans(type === 'all' ? allLoans : allLoans.filter(l => l.cycle.toString() === type));
  }

  async function viewDetails(id) {
    toggleL(true);
    const res = await api({action: 'getLoanDetails', loanId: id});
    toggleL(false);
    if(res.success) {
      document.getElementById('dName').innerText = `${res.userName} (${res.nickname})`;
      document.getElementById('dLoanId').innerText = `ID: ${res.loanId} | เริ่ม: ${res.startDate}`;
      document.getElementById('dPrin').innerText = `฿${Number(res.principal).toLocaleString()}`;
      document.getElementById('dPaid').innerText = `฿${Number(res.totalPaid).toLocaleString()}`;
      document.getElementById('dRemain').innerText = `฿${Number(res.remaining).toLocaleString()}`;
      let hHtml = '';
      if(res.payments.length === 0) hHtml = '<div class="text-center small p-2">ไม่มีประวัติ</div>';
      else res.payments.forEach(p => {
        hHtml += `<div class="p-2 mb-1 rounded small" style="background:#1e293b; border-left:3px solid #10b981">
          <b>งวด ${p.no} (${p.date})</b>: <span class="text-success">฿${p.totalPaid.toLocaleString()}</span>
          ${p.slipUrl && p.slipUrl !== 'ไม่มี' ? `<a href="${p.slipUrl}" target="_blank" class="ms-2 text-info">สลิป</a>` : ''}</div>`;
      });
      document.getElementById('dHistory').innerHTML = hHtml;
      let sHtml = '';
      res.schedule.forEach(s => { sHtml += `<div class="d-flex justify-content-between py-1 small border-bottom border-secondary"><span>งวด ${s.no}: ${s.date}</span><b>฿${Number(s.amount).toLocaleString()}</b></div>`; });
      document.getElementById('dSchedule').innerHTML = sHtml;
      switchDetailTab('History'); openModal('modalDetails');
    }
  }

  function filterLoans() {
    const input = document.getElementById('searchLoan').value.toLowerCase();
    renderLoans(allLoans.filter(l => (l.userName + l.nickname + l.loanId).toLowerCase().includes(input)));
  }

  function toggleNewUserForm(){ document.getElementById('newUserFormBox').style.display = document.getElementById('cUserSelect').value === 'NEW' ? 'block' : 'none'; }

  function generateSchedulePreview() {
    let amount = Number(document.getElementById('cAmount').value) || 0;
    let rate = Number(document.getElementById('cRate').value) || 0;
    let cycle = Number(document.getElementById('cCycle').value) || 1;
    let inst = Number(document.getElementById('cInstallments').value) || 1;
    let dateStr = document.getElementById('cStartDate').value;
    if(!dateStr || amount === 0) return;
    let start = new Date(dateStr);
    let pay = (amount + (amount * (rate/100))) / inst;
    let html = '';
    for(let i=1; i<=inst; i++) {
      let d = new Date(start.getTime() + (i * cycle * 24 * 60 * 60 * 1000));
      html += `<div class="d-flex justify-content-between py-1"><span>งวด ${i}: ${d.toLocaleDateString('th-TH')}</span><b>฿${pay.toFixed(2)}</b></div>`;
    }
    document.getElementById('cSchedulePreview').innerHTML = html;
  }

  function quickPay(id){ document.getElementById('loanIdInput').value = id; document.getElementById('pPayDate').valueAsDate = new Date(); openModal('modalPay'); fetchPreview(); }

  async function fetchPreview(){
    const id = document.getElementById('loanIdInput').value;
    if(!id) return;
    toggleL(true);
    const res = await api({action:'previewPay', loanId:id});
    toggleL(false);
    if(res.success){ curPay = res; document.getElementById('payDetails').style.display = 'block'; document.getElementById('pName').innerText = `👤 ${res.userName} (${res.nickname})`; document.getElementById('pDetailTxt').innerText = `ต้นเหลือ: ฿${res.remainingPrincipal.toLocaleString()} | ดอกงวดนี้: ฿${res.expectedInterest.toLocaleString()}`; }
    else alert('ไม่พบรหัสสัญญา');
  }

  async function submitPay(){
    const amt = document.getElementById('pTotalPaidInput').value;
    if(!amt) return alert('กรอกยอด');
    toggleL(true);
    const slipFile = document.getElementById('pSlip').files[0];
    if(slipFile) {
      let reader = new FileReader();
      reader.readAsDataURL(slipFile);
      reader.onload = async () => { await sendPay(amt, reader.result); };
    } else { await sendPay(amt, ""); }
  }

  async function sendPay(amt, base64) {
    curPay.action = 'submitPay'; curPay.totalPaidAmount = amt; curPay.payDate = document.getElementById('pPayDate').value; curPay.slipBase64 = base64; curPay.method = document.getElementById('pMethod').value;
    await api(curPay); toggleL(false); alert('สำเร็จ'); closeModal('modalPay'); loadDash();
  }
</script>
</body>
</html>
