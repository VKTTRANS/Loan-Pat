<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fintech Admin Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #0b1120; color: #ffffff; padding-bottom: 20px; }
    h1, h2, h3, h4, h5, h6, b, span, p, div { color: #ffffff !important; }
    label, .text-muted { color: #cbd5e1 !important; font-weight: 600; font-size: 0.95rem; display: block; margin-bottom: 4px; }
    .text-info { color: #38bdf8 !important; }
    .text-success { color: #4ade80 !important; }
    .text-warning { color: #facc15 !important; }

    .glass-card { background: #162032; border: 1px solid #334155; border-radius: 12px; }
    .form-control, .form-select { 
      background-color: #1e293b !important; border: 2px solid #475569 !important; color: #ffffff !important; 
      border-radius: 8px; padding: 10px; font-weight: 500;
    }
    .form-control:focus { border-color: #38bdf8 !important; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.4) !important; }
    
    .btn-action { border-radius: 12px; padding: 10px; border: none; font-weight: 700; color: #fff !important; }
    .status-badge { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    
    .modal-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); 
      z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);
    }
    .modal-content-custom {
      background: #162032; border: 1px solid #38bdf8; border-radius: 16px; width: 95%; max-width: 500px; 
      max-height: 90vh; overflow-y: auto; padding: 20px;
    }

    .loader { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; z-index:9999; justify-content:center; align-items:center; flex-direction: column; }
    .borrower-card { background: #1e293b; border-left: 6px solid #38bdf8; border-radius: 10px; margin-bottom: 10px; padding: 12px; cursor: pointer; border-top: 1px solid #334155; border-right: 1px solid #334155; border-bottom: 1px solid #334155; }
    .borrower-card:hover { background: #24334d; transform: translateX(5px); }
    
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 10px 0; }
    .btn-filter { background: #1e293b; color: #fff; border: 1px solid #334155; border-radius: 6px; padding: 5px 12px; font-size: 0.8rem; }
    .btn-filter.active { background: #38bdf8; color: #000 !important; border-color: #38bdf8; }
  </style>
</head>
<body>

<div class="loader" id="loader"><div class="spinner-border text-info mb-3"></div><h6 class="text-white">กำลังโหลด...</h6></div>

<div class="container" style="max-width: 500px;">
  
  <div id="loginPage" class="glass-card p-4 text-center mt-5">
    <h3 class="fw-bold mb-4">Fintech <span class="text-info">Pro</span></h3>
    <input type="text" id="userId" class="form-control mb-3" placeholder="Admin ID" onkeypress="if(event.key==='Enter')login()">
    <input type="password" id="password" class="form-control mb-4" placeholder="Password" onkeypress="if(event.key==='Enter')login()">
    <button onclick="login()" class="btn btn-info w-100 fw-bold shadow">Login</button>
  </div>

  <div id="mainApp" style="display:none">
    <div class="top-bar">
      <h6 class="fw-bold m-0 text-info">Fintech Dashboard</h6>
      <button onclick="location.reload()" class="btn btn-danger btn-sm rounded-pill">Logout</button>
    </div>

    <div class="row g-2 mb-3">
      <div class="col-6"><div class="glass-card p-2 text-center"><small class="text-muted">ปล่อยกู้</small><h5 class="m-0">฿<span id="mTotalLoan">0</span></h5></div></div>
      <div class="col-6"><div class="glass-card p-2 text-center" style="border-color: #38bdf8;"><small class="text-info">คงค้าง</small><h5 class="m-0 text-info">฿<span id="mTotalRemain">0</span></h5></div></div>
    </div>

    <div class="row g-2 mb-3">
      <div class="col-6"><button onclick="openModal('modalPay')" class="btn-action bg-primary w-100 shadow">บันทึกรับเงิน</button></div>
      <div class="col-6"><button onclick="openModal('modalCreate')" class="btn-action bg-success w-100 shadow">ปล่อยยอดกู้</button></div>
    </div>

    <div class="filter-btn-group d-flex gap-1 mb-3">
      <button class="btn-filter active" id="f-all" onclick="filterData('all')">ทั้งหมด</button>
      <button class="btn-filter" id="f-1" onclick="filterData('1')">รายวัน</button>
      <button class="btn-filter" id="f-15" onclick="filterData('15')">15 วัน</button>
      <button class="btn-filter" id="f-30" onclick="filterData('30')">รายเดือน</button>
    </div>
    <input class="form-control mb-3" type="text" id="searchLoan" placeholder="🔍 ค้นชื่อ..." onkeyup="filterLoans()">
    <div id="loanContainer"></div>
  </div>
</div>

<div id="modalDetails" class="modal-overlay">
  <div class="modal-content-custom">
    <div class="d-flex justify-content-between mb-3 border-bottom border-secondary pb-2">
      <h6 class="fw-bold m-0">รายละเอียดสัญญา</h6>
      <i class="fa-solid fa-times text-danger fs-4" onclick="closeModal('modalDetails')"></i>
    </div>
    <div class="p-3 mb-3 rounded" style="background: rgba(56, 189, 248, 0.1); border: 1px solid #38bdf8;">
      <h5 class="fw-bold" id="dName">...</h5>
      <p class="small text-info mb-1" id="dDetails">...</p>
      <div class="row text-center border-top border-secondary pt-2 mt-2">
        <div class="col-6 border-end border-secondary"><small class="text-muted">กู้</small><b id="dPrin">0</b></div>
        <div class="col-6"><small class="text-muted">คงเหลือ</small><b class="text-warning" id="dRemain">0</b></div>
      </div>
    </div>
    <h6 class="fw-bold small mb-2 text-success">ประวัติชำระ</h6>
    <div id="dHistory" style="max-height: 200px; overflow-y: auto;"></div>
  </div>
</div>

<div id="modalPay" class="modal-overlay">
  <div class="modal-content-custom">
    <div class="d-flex justify-content-between mb-3">
      <h6 class="fw-bold text-info">บันทึกรับชำระเงิน</h6>
      <i class="fa-solid fa-times text-danger fs-4" onclick="closeModal('modalPay')"></i>
    </div>
    <label>เลือกชื่อคนยืม</label>
    <input list="payList" id="paySearch" class="form-control mb-3" placeholder="พิมพ์ชื่อ...">
    <datalist id="payList"></datalist>
    <button onclick="fetchPreview()" class="btn btn-info w-100 fw-bold mb-3">ดึงข้อมูล</button>
    
    <div id="payDetails" style="display:none">
      <div class="p-2 mb-3 rounded border border-secondary" style="background:#0f172a">
        <h6 id="pName" class="fw-bold m-0">...</h6>
        <p id="pInfo" class="small text-info m-0">...</p>
      </div>
      <label>ยอดรับเงินจริง (บาท)</label>
      <input type="number" id="pAmt" class="form-control fw-bold fs-4 mb-3 border-info">
      <label>วันที่จ่าย</label>
      <input type="date" id="pDate" class="form-control mb-3">
      <button onclick="submitPay()" class="btn btn-primary w-100 fw-bold py-2">ยืนยันรับเงินและหักยอด</button>
    </div>
  </div>
</div>

<div id="modalCreate" class="modal-overlay">
  <div class="modal-content-custom">
    <div class="d-flex justify-content-between mb-3">
      <h6 class="fw-bold text-success">เปิดสัญญากู้ใหม่</h6>
      <i class="fa-solid fa-times text-danger fs-4" onclick="closeModal('modalCreate')"></i>
    </div>
    <select id="cUser" class="form-select mb-2" onchange="toggleNewUser()"><option value="NEW">➕ ผู้กู้รายใหม่</option></select>
    <div id="newUserBox">
      <input type="text" id="cName" class="form-control mb-2" placeholder="ชื่อ-นามสกุล">
      <input type="text" id="cNick" class="form-control mb-2" placeholder="ชื่อเล่น">
      <input type="text" id="cPhone" class="form-control mb-2" placeholder="เบอร์โทร">
      <input type="text" id="cDetails" class="form-control mb-2" placeholder="รายละเอียดเพิ่มเติม (ที่ทำงาน/อื่นๆ)">
    </div>
    <div class="row g-2">
      <div class="col-12"><label>วันที่เริ่ม</label><input type="date" id="cStart" class="form-control"></div>
      <div class="col-6"><label>เงินต้น</label><input type="number" id="cAmount" class="form-control"></div>
      <div class="col-6"><label>ดอก (%)</label><input type="number" id="cRate" class="form-control" value="5"></div>
      <div class="col-6"><label>รอบ</label><select id="cCycle" class="form-select"><option value="1">รายวัน</option><option value="15">15 วัน</option><option value="30">รายเดือน</option></select></div>
      <div class="col-6"><label>งวด</label><input type="number" id="cInst" class="form-control" value="1"></div>
    </div>
    <button onclick="saveLoan()" class="btn btn-success w-100 fw-bold mt-3">บันทึกข้อมูล</button>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxkq39mAaFRG584lXiQfqogwzTiPCjRWleq1L8JKiDVqa4YYphMRTYvlgefOqVI4ac4yQ/exec";
  let allLoans = [];
  let curLoan = null;

  function toggleL(s){ document.getElementById('loader').style.display=s?'flex':'none'; }
  function openModal(id){ document.getElementById(id).style.display='flex'; }
  function closeModal(id){ document.getElementById(id).style.display='none'; }

  async function api(d){ const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(d)}); return await r.json(); }

  async function login(){
    toggleL(true);
    const res=await api({action:'login',userId:document.getElementById('userId').value,password:document.getElementById('password').value});
    toggleL(false);
    if(res.success){ document.getElementById('loginPage').style.display='none'; document.getElementById('mainApp').style.display='block'; loadDash(); }
    else alert('ID หรือรหัสผ่านไม่ถูกต้อง');
  }

  async function loadDash(){
    const res=await api({action:'getDashboard'});
    allLoans=res.activeLoans;
    document.getElementById('mTotalLoan').innerText=Math.round(res.metrics.totalLoan).toLocaleString();
    document.getElementById('mTotalRemain').innerText=Math.round(res.metrics.totalRemain).toLocaleString();
    
    let uOpt='<option value="NEW">➕ ผู้กู้รายใหม่</option>';
    let dList='';
    res.users.forEach(u=>uOpt+=`<option value="${u.id}">${u.name} (${u.nickname})</option>`);
    allLoans.forEach(l=>dList+=`<option value="${l.loanId}">${l.userName} (${l.nickname})</option>`);
    
    document.getElementById('cUser').innerHTML=uOpt;
    document.getElementById('payList').innerHTML=dList;
    renderLoans(allLoans);
  }

  function renderLoans(data){
    let h='';
    data.forEach(l=>{
      let cls=l.daysLeft<=0?'bg-danger':(l.daysLeft<=3?'bg-warning text-dark':'bg-primary');
      h+=`<div class="borrower-card" onclick="viewDetails('${l.loanId}')">
        <div class="d-flex justify-content-between">
          <div><h6 class="fw-bold m-0">👤 ${l.userName} (${l.nickname})</h6><p class="m-0 text-info small">ค้าง ฿${Number(l.amount).toLocaleString()}</p></div>
          <div class="text-end"><span class="status-badge ${cls}">${l.daysLeft<=0?'เลยกำหนด':`อีก ${l.daysLeft} วัน`}</span></div>
        </div></div>`;
    });
    document.getElementById('loanContainer').innerHTML=h||'<p class="text-center text-muted mt-3">ไม่มีข้อมูล</p>';
  }

  async function viewDetails(id){
    toggleL(true);
    const res=await api({action:'getLoanDetails',loanId:id});
    toggleL(false);
    if(res.success){
      document.getElementById('dName').innerText=`${res.userName} (${res.nickname})`;
      document.getElementById('dDetails').innerText=res.details||'ไม่มีรายละเอียดเพิ่มเติม';
      document.getElementById('dPrin').innerText=`฿${Number(res.principal).toLocaleString()}`;
      document.getElementById('dRemain').innerText=`฿${Number(res.remaining).toLocaleString()}`;
      let hh='';
      res.history.forEach(p=>hh+=`<div class="p-2 mb-1 rounded small border border-secondary"><b>${p.date}</b>: จ่าย ฿${Number(p.total).toLocaleString()}</div>`);
      document.getElementById('dHistory').innerHTML=hh||'<p class="text-center small">ไม่มีประวัติ</p>';
      openModal('modalDetails');
    }
  }

  function filterData(c){
    document.querySelectorAll('.btn-filter').forEach(b=>b.classList.remove('active'));
    document.getElementById('f-'+c).classList.add('active');
    renderLoans(c==='all'?allLoans:allLoans.filter(l=>l.cycle.toString()===c));
  }

  function filterLoans(){
    let v=document.getElementById('searchLoan').value.toLowerCase();
    renderLoans(allLoans.filter(l=>(l.userName+l.nickname).toLowerCase().includes(v)));
  }

  function toggleNewUser(){ document.getElementById('newUserBox').style.display=document.getElementById('cUser').value==='NEW'?'block':'none'; }

  async function saveLoan(){
    toggleL(true);
    await api({action:'saveLoan',userId:document.getElementById('cUser').value,name:document.getElementById('cName').value,nickname:document.getElementById('cNick').value,phone:document.getElementById('cPhone').value,details:document.getElementById('cDetails').value,amount:document.getElementById('cAmount').value,rate:document.getElementById('cRate').value,cycle:document.getElementById('cCycle').value,installments:document.getElementById('cInst').value,startDate:document.getElementById('cStart').value});
    toggleL(false); alert('สำเร็จ'); closeModal('modalCreate'); loadDash();
  }

  async function fetchPreview(){
    let v=document.getElementById('paySearch').value;
    let loan=allLoans.find(l=>l.loanId===v || l.userName===v);
    if(!loan) return alert('ไม่พบชื่อนี้');
    toggleL(true);
    const res=await api({action:'previewPay',loanId:loan.loanId});
    toggleL(false);
    if(res.success){ curLoan=res; document.getElementById('payDetails').style.display='block'; document.getElementById('pName').innerText=res.userName; document.getElementById('pInfo').innerText=`ค้าง: ฿${res.remaining.toLocaleString()} | ดอก: ฿${res.interest.toLocaleString()}`; document.getElementById('pDate').valueAsDate=new Date(); }
  }

  async function submitPay(){
    toggleL(true);
    await api({action:'submitPay',loanId:curLoan.loanId,amount:document.getElementById('pAmt').value,payDate:document.getElementById('pDate').value,method:document.getElementById('pMethod').value});
    toggleL(false); alert('บันทึกสำเร็จ'); closeModal('modalPay'); loadDash();
  }
</script>
</body>
</html>
