<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fintech Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* บังคับสีพื้นหลังและสีตัวหนังสือให้อ่านออก 100% */
    body { font-family: 'Prompt', sans-serif; background-color: #0b1120; color: #ffffff; padding-bottom: 50px; }
    h1, h2, h3, h4, h5, h6, p, span, div { color: #ffffff; }
    label, .small, .text-muted { color: #cbd5e1 !important; font-weight: 500; font-size: 0.95rem; }
    .text-info { color: #38bdf8 !important; }

    .glass-card { background: #162032; border: 1px solid #334155; border-radius: 20px; }
    
    /* กล่องข้อความสีสว่างตัดกับพื้น */
    .form-control, .form-select { 
      background-color: #1e293b !important; 
      border: 1px solid #475569 !important; 
      color: #ffffff !important; 
      border-radius: 12px; 
      padding: 14px;
    }
    .form-control::placeholder { color: #94a3b8 !important; opacity: 1; }
    .form-control:focus, .form-select:focus { border-color: #38bdf8 !important; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.3) !important; }
    
    .btn-action { border-radius: 16px; padding: 20px; border: none; font-weight: 700; transition: 0.2s; color: #fff !important; }
    .btn-action:active { transform: scale(0.95); }
    .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; color: #fff; }
    
    /* ระบบ POPUP (Modal) */
    .modal-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0, 0, 0, 0.85); 
      z-index: 1000; display: none; align-items: center; justify-content: center; 
      backdrop-filter: blur(5px);
    }
    .modal-content-custom {
      background: #162032; border: 1px solid #38bdf8; border-radius: 20px; 
      width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    /* ตัวโหลด */
    .loader { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; z-index:9999; justify-content:center; align-items:center; flex-direction: column; }
    
    /* สไตล์การ์ดผู้กู้ - ทำให้คลิกได้ */
    .borrower-card { 
      background: #1e293b; border-left: 5px solid #38bdf8; border-radius: 12px; 
      margin-bottom: 15px; padding: 15px; cursor: pointer; transition: 0.2s;
    }
    .borrower-card:hover { background: #293850; transform: translateY(-2px); }
  </style>
</head>
<body>

<div class="loader" id="loader">
  <div class="spinner-border text-info mb-3"></div>
  <h5 class="text-white fw-bold">กำลังประมวลผล...</h5>
</div>

<div class="container" style="max-width: 600px; padding: 20px 15px;">
  
  <div id="loginPage" class="glass-card p-5 text-center mt-5">
    <h2 class="fw-bold mb-4">Fintech <span class="text-info">Admin</span></h2>
    <label class="d-block text-start mb-1">รหัสแอดมิน</label>
    <input type="text" id="userId" class="form-control mb-3" placeholder="Admin ID">
    <label class="d-block text-start mb-1">รหัสผ่าน</label>
    <input type="password" id="password" class="form-control mb-4" placeholder="Password">
    <button onclick="login()" class="btn btn-info w-100 py-3 fw-bold text-white shadow-lg">เข้าสู่ระบบ</button>
  </div>

  <div id="mainApp" style="display:none">
    <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
      <h4 class="fw-bold m-0 text-info">Fintech Admin</h4>
      <button onclick="location.reload()" class="btn btn-outline-danger btn-sm rounded-pill px-3">Logout</button>
    </div>

    <div class="glass-card p-4 mb-4 text-center">
      <label class="text-muted fw-bold">ยอดเงินกู้คงค้างในระบบทั้งหมด</label>
      <h1 class="fw-bold text-info mt-2">฿<span id="mTotal">0.00</span></h1>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-6">
        <button onclick="openModal('modalPay')" class="btn-action bg-primary w-100 shadow-lg">
          <i class="fa-solid fa-hand-holding-dollar d-block mb-2 fs-3"></i> รับชำระเงิน
        </button>
      </div>
      <div class="col-6">
        <button onclick="openModal('modalCreate')" class="btn-action bg-success w-100 shadow-lg">
          <i class="fa-solid fa-file-signature d-block mb-2 fs-3"></i> สร้างคนกู้
        </button>
      </div>
    </div>

    <div class="mt-4">
      <h5 class="fw-bold mb-3"><i class="fa-solid fa-users text-info me-2"></i>รายชื่อผู้กู้ทั้งหมด</h5>
      <input class="form-control mb-3" type="text" id="searchLoan" placeholder="🔍 พิมพ์เพื่อค้นหาชื่อ หรือ รหัสสัญญา..." onkeyup="filterLoans()">
      <div id="loanContainer">
        </div>
    </div>
  </div>
</div>

<div id="modalDetails" class="modal-overlay">
  <div class="modal-content-custom">
    <div class="d-flex justify-content-between mb-3 border-bottom border-secondary pb-3">
      <h5 class="fw-bold m-0 text-white"><i class="fa-solid fa-file-invoice me-2"></i>รายละเอียดสัญญา</h5>
      <i class="fa-solid fa-circle-xmark text-danger fs-3" onclick="closeModal('modalDetails')" style="cursor:pointer"></i>
    </div>
    
    <div class="p-3 mb-3 rounded" style="background: rgba(56, 189, 248, 0.1); border: 1px solid #38bdf8;">
      <h5 class="fw-bold text-white mb-1" id="dName">ชื่อผู้กู้</h5>
      <small class="text-info d-block mb-2" id="dLoanId">L12345</small>
      <div class="row text-center mt-3 border-top border-secondary pt-2">
        <div class="col-4 border-end border-secondary">
          <small class="text-muted d-block">ยอดกู้เต็ม</small>
          <b class="text-white" id="dPrin">0</b>
        </div>
        <div class="col-4 border-end border-secondary">
          <small class="text-muted d-block">ชำระแล้ว</small>
          <b class="text-success" id="dPaid">0</b>
        </div>
        <div class="col-4">
          <small class="text-muted d-block">คงเหลือ</small>
          <b class="text-warning fs-5" id="dRemain">0</b>
        </div>
      </div>
    </div>

    <h6 class="fw-bold text-muted mb-2">ประวัติการชำระเงิน</h6>
    <div id="dHistory" style="max-height: 250px; overflow-y: auto;">
      </div>
  </div>
</div>

<div id="modalPay" class="modal-overlay">
  <div class="modal-content-custom">
    <div class="d-flex justify-content-between mb-4 border-bottom border-secondary pb-3">
      <h5 class="fw-bold m-0 text-info"><i class="fa-solid fa-wallet me-2"></i>บันทึกรับชำระเงิน</h5>
      <i class="fa-solid fa-circle-xmark text-danger fs-3" onclick="closeModal('modalPay')" style="cursor:pointer"></i>
    </div>
    
    <label>กรอกรหัสสัญญาเพื่อดึงข้อมูล</label>
    <div class="input-group mb-3">
      <input type="text" id="loanIdInput" class="form-control" placeholder="เช่น L12345">
      <button onclick="fetchPreview()" class="btn btn-info text-white fw-bold px-4">ค้นหา</button>
    </div>
    
    <div id="payDetails" style="display:none" class="mt-3">
      <div class="p-3 mb-3 rounded" style="background: #0f172a; border: 1px dashed #475569;">
        <h5 class="m-0 text-white fw-bold" id="pName">ชื่อผู้กู้</h5>
        <p class="text-info m-0 mt-1" id="pDetailTxt">รายละเอียด</p>
      </div>

      <div class="row g-2 mb-3">
        <div class="col-6">
          <label class="text-warning">หักดอกเบี้ย (บาท)</label>
          <input type="number" id="pInt" class="form-control text-warning fw-bold fs-5">
        </div>
        <div class="col-6">
          <label class="text-success">หักเงินต้น (บาท)</label>
          <input type="number" id="pPrin" class="form-control text-success fw-bold fs-5">
        </div>
      </div>
      
      <label>ช่องทางชำระ</label>
      <select id="pMethod" class="form-select mb-3">
        <option value="เงินโอน">โอนเข้าบัญชี</option>
        <option value="เงินสด">เงินสด</option>
      </select>
      
      <label>แนบสลิป (ถ้ามี)</label>
      <input type="file" id="pSlip" class="form-control mb-4">
      
      <button onclick="submitPay()" class="btn btn-primary w-100 fw-bold py-3 fs-5">ยืนยันการหักยอด</button>
    </div>
  </div>
</div>

<div id="modalCreate" class="modal-overlay">
  <div class="modal-content-custom">
    <div class="d-flex justify-content-between mb-4 border-bottom border-secondary pb-3">
      <h5 class="fw-bold m-0 text-success"><i class="fa-solid fa-file-pen me-2"></i>สร้างบัญชี / ปล่อยกู้</h5>
      <i class="fa-solid fa-circle-xmark text-danger fs-3" onclick="closeModal('modalCreate')" style="cursor:pointer"></i>
    </div>
    
    <label>เลือกคนเก่า หรือ สร้างใหม่</label>
    <select id="cUserSelect" class="form-select mb-3" onchange="toggleNewUserForm()">
      <option value="NEW">➕ สร้างบัญชีผู้กู้คนใหม่</option>
    </select>
    
    <div id="newUserFormBox" class="p-3 mb-3 rounded" style="background: #0f172a;">
      <label>ชื่อ-นามสกุลจริง</label>
      <input type="text" id="cName" class="form-control mb-2" placeholder="ระบุชื่อจริง">
      <label>ชื่อเล่น</label>
      <input type="text" id="cNick" class="form-control mb-2" placeholder="ระบุชื่อเล่น">
      <label>เบอร์โทรศัพท์</label>
      <input type="text" id="cPhone" class="form-control mb-2" placeholder="08xxxxxxxx">
      <label>สถานที่ทำงาน</label>
      <input type="text" id="cWork" class="form-control mb-2" placeholder="ระบุสถานที่ทำงาน">
      <label>รูปถ่ายผู้กู้ (ถ้ามี)</label>
      <input type="file" id="cPhoto" class="form-control">
    </div>

    <h6 class="fw-bold text-info mt-4 mb-2">รายละเอียดสัญญา</h6>
    <div class="row g-2 mb-3">
      <div class="col-12">
        <label>วันที่เริ่มกู้เงิน</label>
        <input type="date" id="cStartDate" class="form-control">
      </div>
      <div class="col-6">
        <label>เงินต้น (บาท)</label>
        <input type="number" id="cAmount" class="form-control text-white fw-bold" placeholder="10000">
      </div>
      <div class="col-6">
        <label>ดอกเบี้ย (%)</label>
        <input type="number" id="cRate" class="form-control" placeholder="5">
      </div>
      <div class="col-6">
        <label>รอบการชำระ</label>
        <select id="cCycle" class="form-select">
          <option value="1">ทุก 1 วัน</option>
          <option value="15">ทุก 15 วัน</option>
          <option value="30">ทุก 30 วัน</option>
        </select>
      </div>
      <div class="col-6">
        <label>จำนวนงวด</label>
        <input type="number" id="cInstallments" class="form-control" value="1">
      </div>
    </div>
    <button onclick="saveLoan()" class="btn btn-success w-100 py-3 fw-bold fs-5 mt-2">บันทึกสร้างสัญญากู้</button>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxkq39mAaFRG584lXiQfqogwzTiPCjRWleq1L8JKiDVqa4YYphMRTYvlgefOqVI4ac4yQ/exec";
  let curPay = null;

  document.getElementById('cStartDate').valueAsDate = new Date();

  function toggleL(s){ document.getElementById('loader').style.display = s?'flex':'none'; }

  function openModal(id) { document.getElementById(id).style.display = 'flex'; }
  function closeModal(id) { 
    document.getElementById(id).style.display = 'none'; 
    if(id === 'modalPay') {
      document.getElementById('loanIdInput').value = '';
      document.getElementById('payDetails').style.display = 'none';
    }
  }

  async function api(data){
    const r = await fetch(GAS_URL, {method:'POST', body:JSON.stringify(data)});
    return await r.json();
  }

  async function login(){
    toggleL(true);
    const res = await api({action:'login', userId:document.getElementById('userId').value, password:document.getElementById('password').value});
    toggleL(false);
    if(res.success && res.role==='Admin'){
      document.getElementById('loginPage').style.display='none';
      document.getElementById('mainApp').style.display='block';
      loadDash();
    } else alert('รหัสผ่านหรือ Admin ID ไม่ถูกต้อง');
  }

  async function loadDash(){
    const res = await api({action:'getDashboard'});
    document.getElementById('mTotal').innerText = res.metrics.total.toLocaleString();
    
    let optHtml = '<option value="NEW">➕ สร้างบัญชีผู้กู้คนใหม่</option>';
    res.users.forEach(u => { optHtml += `<option value="${u.id}">${u.name} (${u.nickname})</option>`; });
    document.getElementById('cUserSelect').innerHTML = optHtml;
    
    let html = '';
    res.activeLoans.forEach(b => {
      let statusClass = b.daysLeft <= 0 ? 'bg-danger' : (b.daysLeft <= 3 ? 'bg-warning text-dark' : 'bg-primary');
      let statusText = b.daysLeft < 0 ? `เลยกำหนด ${Math.abs(b.daysLeft)} วัน` : (b.daysLeft === 0 ? 'ครบกำหนดวันนี้!' : `อีก ${b.daysLeft} วัน`);
      let displayName = b.userName ? b.userName : 'ไม่ระบุชื่อ';
      
      // การ์ดคลิกได้ (เปิดประวัติ) และปุ่มแยกต่างหาก (เปิดรับชำระ)
      html += `
        <div class="borrower-card loan-item" data-name="${displayName} ${b.nickname} ${b.loanId}" onclick="viewDetails('${b.loanId}')">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <h4 class="fw-bold mb-1 text-white">👤 ${displayName} ${b.nickname ? `(${b.nickname})` : ''}</h4>
              <p class="mb-1 text-muted small">รหัสสัญญา: <span class="text-info">${b.loanId}</span></p>
              <p class="mb-0 text-info fw-bold fs-5">ยอดค้าง: ฿${Number(b.amount).toLocaleString()}</p>
              <p class="mb-0 text-muted small">ดิวจ่าย: ${b.dueDate}</p>
            </div>
            <div class="text-end">
              <span class="status-badge ${statusClass} d-block mb-2">${statusText}</span>
              <button class="btn btn-sm btn-primary rounded-pill px-3 fw-bold shadow" onclick="event.stopPropagation(); quickPay('${b.loanId}')">กดชำระ</button>
            </div>
          </div>
        </div>`;
    });
    document.getElementById('loanContainer').innerHTML = html || '<div class="text-center text-muted p-3">ไม่มีข้อมูลผู้กู้ในระบบ</div>';
  }

  // ดูรายละเอียดและประวัติ
  async function viewDetails(id) {
    toggleL(true);
    const res = await api({action: 'getLoanDetails', loanId: id});
    toggleL(false);
    if(res.success) {
      document.getElementById('dName').innerText = `${res.userName} ${res.nickname ? `(${res.nickname})` : ''}`;
      document.getElementById('dLoanId').innerText = `รหัส: ${res.loanId} | สถานะ: ${res.status}`;
      document.getElementById('dPrin').innerText = `฿${Number(res.principal).toLocaleString()}`;
      document.getElementById('dPaid').innerText = `฿${Number(res.totalPaid).toLocaleString()}`;
      document.getElementById('dRemain').innerText = `฿${Number(res.remaining).toLocaleString()}`;
      
      let hHtml = '';
      if(res.payments.length === 0) {
        hHtml = '<div class="text-center text-muted small p-2">ยังไม่มีประวัติการชำระเงิน</div>';
      } else {
        res.payments.forEach(p => {
          hHtml += `
            <div class="p-2 mb-2 rounded" style="background: #1e293b; border-left: 3px solid #10b981;">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <b class="text-white small">งวดที่ ${p.no}</b>
                  <small class="text-muted d-block" style="font-size:0.75rem;">${p.date} | ${p.method}</small>
                </div>
                <div class="text-end">
                  <b class="text-success">฿${Number(p.totalPaid).toLocaleString()}</b>
                  ${p.slipUrl && p.slipUrl !== 'ไม่มี' ? `<br><a href="${p.slipUrl}" target="_blank" class="small text-info text-decoration-none">ดูสลิป</a>` : ''}
                </div>
              </div>
            </div>
          `;
        });
      }
      document.getElementById('dHistory').innerHTML = hHtml;
      openModal('modalDetails');
    } else {
      alert('ไม่สามารถดึงข้อมูลได้');
    }
  }

  function filterLoans() {
    const input = document.getElementById('searchLoan').value.toLowerCase();
    const items = document.querySelectorAll('.loan-item');
    items.forEach(item => {
      const text = item.getAttribute('data-name').toLowerCase();
      item.style.display = text.includes(input) ? 'block' : 'none';
    });
  }

  function toggleNewUserForm(){
    document.getElementById('newUserFormBox').style.display = (document.getElementById('cUserSelect').value === 'NEW') ? 'block' : 'none';
  }

  function getBase64(file) {
    return new Promise((resolve) => {
      if(!file) resolve("");
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
    });
  }

  async function saveLoan(){
    toggleL(true);
    const photoBase64 = await getBase64(document.getElementById('cPhoto').files[0]);
    await api({ 
      action:'saveLoan', userId: document.getElementById('cUserSelect').value, name: document.getElementById('cName').value, 
      nickname: document.getElementById('cNick').value, phone: document.getElementById('cPhone').value, 
      workplace: document.getElementById('cWork').value, photoBase64: photoBase64,
      amount: document.getElementById('cAmount').value, rate: document.getElementById('cRate').value, 
      cycle: document.getElementById('cCycle').value, installments: document.getElementById('cInstallments').value,
      startDate: document.getElementById('cStartDate').value
    });
    toggleL(false);
    alert('บันทึกสัญญากู้สำเร็จ');
    closeModal('modalCreate');
    loadDash();
  }

  function quickPay(id){
    document.getElementById('loanIdInput').value = id;
    openModal('modalPay');
    fetchPreview();
  }

  async function fetchPreview(){
    const id = document.getElementById('loanIdInput').value;
    if(!id) return;
    toggleL(true);
    const res = await api({action:'previewPay', loanId:id});
    toggleL(false);
    if(res.success){
      curPay = res;
      document.getElementById('payDetails').style.display = 'block';
      document.getElementById('pName').innerText = res.userName;
      document.getElementById('pDetailTxt').innerText = `ต้นเหลือ: ฿${res.remainingPrincipal.toLocaleString()} | งวดที่: ${res.nextNo}`;
      document.getElementById('pInt').value = res.expectedInterest;
      document.getElementById('pPrin').value = 0;
    } else {
      alert('ไม่พบรหัสสัญญาในระบบ');
    }
  }

  async function submitPay(){
    toggleL(true);
    const slipBase64 = await getBase64(document.getElementById('pSlip').files[0]);
    curPay.action = 'submitPay';
    curPay.prinPaid = document.getElementById('pPrin').value;
    curPay.intPaid = document.getElementById('pInt').value;
    curPay.slipBase64 = slipBase64;
    curPay.method = document.getElementById('pMethod').value;
    await api(curPay);
    toggleL(false);
    alert('บันทึกชำระเงินสำเร็จ');
    closeModal('modalPay');
    loadDash();
  }
</script>
</body>
</html>
