<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LMS Dashboard 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --bg: #0b1120; --card: #161f32; --accent: #38bdf8; --input-bg: #1f2937; }
    body { font-family: 'Plus Jakarta Sans', 'Prompt', sans-serif; background: var(--bg); color: #f1f5f9; }
    .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
    
    /* Input Visibility Fix */
    .form-control, .form-select { 
      background: var(--input-bg) !important; 
      border: 1px solid #374151 !important; 
      color: #fff !important; 
      border-radius: 12px;
      padding: 12px;
    }
    
    .btn-action { border-radius: 18px; padding: 20px; transition: 0.3s; border: none; font-weight: 700; }
    .btn-action:hover { transform: translateY(-5px); opacity: 0.9; }
    
    .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .due-alert { border-left: 4px solid #f43f5e; }
    .loader { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; z-index:9999; justify-content:center; align-items:center; }
  </style>
</head>
<body>

<div class="loader" id="loader"><div class="spinner-border text-info"></div></div>

<div class="container" style="max-width: 600px; padding: 25px 15px;">
  
  <div id="loginPage" class="glass p-5 text-center mt-5">
    <h2 class="fw-bold mb-4">LMS <span class="text-info">2026</span></h2>
    <input type="text" id="userId" class="form-control mb-3" placeholder="รหัสผู้ใช้งาน" onkeypress="if(event.key==='Enter')login()">
    <input type="password" id="password" class="form-control mb-4" placeholder="รหัสผ่าน" onkeypress="if(event.key==='Enter')login()">
    <button onclick="login()" class="btn btn-info w-100 py-3 fw-bold text-white shadow">เข้าสู่ระบบ</button>
  </div>

  <div id="mainApp" style="display:none">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-bold m-0">Dashboard</h4>
      <button onclick="location.reload()" class="btn btn-outline-danger btn-sm rounded-pill px-3">Logout</button>
    </div>

    <div class="glass p-4 mb-4 text-center">
      <small class="text-muted">เงินปล่อยกู้รวมทั้งหมด</small>
      <h1 class="fw-bold text-info mt-1">฿<span id="mTotal">0.00</span></h1>
      <div class="row mt-3">
        <div class="col-6 border-end border-secondary">
          <small class="d-block text-muted">สัญญาใช้งาน</small>
          <b id="mActive">0</b>
        </div>
        <div class="col-6">
          <small class="d-block text-muted">ใกล้ครบกำหนด</small>
          <b class="text-danger" id="mAlert">0</b>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-6">
        <button onclick="showSection('pay')" class="btn-action btn-primary w-100 shadow">
          <i class="fa-solid fa-hand-holding-dollar d-block mb-2 fs-3"></i> รับชำระเงิน
        </button>
      </div>
      <div class="col-6">
        <button onclick="showSection('create')" class="btn-action btn-success w-100 shadow">
          <i class="fa-solid fa-user-plus d-block mb-2 fs-3"></i> สร้างผู้กู้
        </button>
      </div>
    </div>

    <div id="section-list">
      <h6 class="fw-bold mb-3 text-muted">รายชื่อผู้กู้และความเคลื่อนไหว</h6>
      <div id="borrowerContainer"></div>
    </div>

    <div id="section-pay" class="glass p-4 mb-4" style="display:none">
      <div class="d-flex justify-content-between mb-3">
        <h6 class="fw-bold">รับชำระเงิน</h6>
        <i class="fa-solid fa-xmark text-muted" onclick="showSection('list')"></i>
      </div>
      <div class="input-group mb-3">
        <input type="text" id="loanIdInput" class="form-control" placeholder="รหัสสัญญา">
        <button onclick="fetchPreview()" class="btn btn-info text-white">ดึงข้อมูล</button>
      </div>
      <div id="payDetails" style="display:none" class="p-3 rounded-4 bg-black bg-opacity-25 mb-3">
        <small class="text-muted">ยอดรวมชำระงวดนี้</small>
        <h3 class="text-success fw-bold">฿<span id="pTotal"></span></h3>
        <select id="pMethod" class="form-select mt-3 mb-3">
          <option value="เงินโอน">เงินโอน</option>
          <option value="เงินสด">เงินสด</option>
        </select>
        <button onclick="submitPay()" class="btn btn-primary w-100 fw-bold py-2">ยืนยันการรับชำระ</button>
      </div>
    </div>

    <div id="section-create" class="glass p-4 mb-4" style="display:none">
      <div class="d-flex justify-content-between mb-3">
        <h6 class="fw-bold">สร้างข้อมูลผู้กู้ใหม่</h6>
        <i class="fa-solid fa-xmark text-muted" onclick="showSection('list')"></i>
      </div>
      <input type="text" id="fId" class="form-control mb-2" placeholder="รหัสผู้กู้ (เช่น U001)">
      <input type="text" id="fName" class="form-control mb-2" placeholder="ชื่อ-นามสกุล">
      <input type="text" id="fPass" class="form-control mb-2" placeholder="กำหนดรหัสผ่าน">
      <input type="text" id="fPhone" class="form-control mb-3" placeholder="เบอร์โทรศัพท์">
      <button onclick="saveUser()" class="btn btn-success w-100 py-2 fw-bold">บันทึกข้อมูล</button>
    </div>

  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxkq39mAaFRG584lXiQfqogwzTiPCjRWleq1L8JKiDVqa4YYphMRTYvlgefOqVI4ac4yQ/exec";
  let curPay = null;

  function toggleL(s){ document.getElementById('loader').style.display = s?'flex':'none'; }

  async function api(data){
    const r = await fetch(GAS_URL, {method:'POST', body:JSON.stringify(data)});
    return await r.json();
  }

  async function login(){
    toggleL(true);
    const res = await api({action:'login', userId:document.getElementById('userId').value, password:document.getElementById('password').value});
    toggleL(false);
    if(res.success && res.role==='Admin'){
      document.getElementById('loginPage').style.display='none';
      document.getElementById('mainApp').style.display='block';
      loadDash();
    } else alert('ข้อมูลไม่ถูกต้อง');
  }

  async function loadDash(){
    const res = await api({action:'getDashboard'});
    document.getElementById('mTotal').innerText = res.metrics.total.toLocaleString();
    document.getElementById('mActive').innerText = res.metrics.active;
    document.getElementById('mAlert').innerText = res.metrics.alert;
    
    let html = '';
    res.borrowers.forEach(b => {
      let statusClass = b.daysLeft === null ? '' : (b.daysLeft <= 0 ? 'bg-danger' : (b.daysLeft <= 3 ? 'bg-warning text-dark' : 'bg-success'));
      let statusText = b.daysLeft === null ? 'ไม่มีสัญญา' : (b.daysLeft <= 0 ? 'เลยกำหนด' : `อีก ${b.daysLeft} วัน`);
      
      html += `
        <div class="glass p-3 mb-2 d-flex justify-content-between align-items-center ${b.daysLeft <= 3 && b.daysLeft !== null ? 'due-alert' : ''}">
          <div>
            <div class="fw-bold">${b.name}</div>
            <small class="text-muted">฿${b.loanAmount.toLocaleString()} | กำหนด: ${b.dueDate}</small>
          </div>
          <div class="text-end">
            <span class="status-badge ${statusClass}">${statusText}</span>
            ${b.loanId ? `<div class="small mt-1 text-info" style="cursor:pointer" onclick="quickPay('${b.loanId}')">รับชำระ</div>` : ''}
          </div>
        </div>`;
    });
    document.getElementById('borrowerContainer').innerHTML = html;
  }

  function showSection(s){
    ['list','pay','create'].forEach(id => document.getElementById('section-'+id).style.display = id===s?'block':'none');
  }

  function quickPay(id){
    document.getElementById('loanIdInput').value = id;
    showSection('pay');
    fetchPreview();
  }

  async function fetchPreview(){
    const id = document.getElementById('loanIdInput').value;
    toggleL(true);
    const res = await api({action:'preview', loanId:id});
    toggleL(false);
    if(res.success){
      curPay = res;
      document.getElementById('payDetails').style.display = 'block';
      document.getElementById('pTotal').innerText = res.total.toLocaleString();
    } else alert('ไม่พบรหัสสัญญา');
  }

  async function submitPay(){
    toggleL(true);
    curPay.action = 'submit';
    curPay.method = document.getElementById('pMethod').value;
    await api(curPay);
    toggleL(false);
    alert('บันทึกสำเร็จ');
    showSection('list');
    loadDash();
  }

  async function saveUser(){
    toggleL(true);
    await api({
      action:'saveUser',
      userId: document.getElementById('fId').value,
      name: document.getElementById('fName').value,
      password: document.getElementById('fPass').value,
      phone: document.getElementById('fPhone').value,
      role: 'User'
    });
    toggleL(false);
    alert('สร้างผู้กู้สำเร็จ');
    showSection('list');
    loadDash();
  }

</script>
</body>
</html>
